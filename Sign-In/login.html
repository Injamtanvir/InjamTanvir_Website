<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup & Signin Page</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-container" id="signup-form">
  <h2>Signup</h2>
  <form>
    <input type="text" id="first-name" placeholder="First Name" required>
    <input type="text" id="last-name" placeholder="Last Name" required>
    <input type="text" id="username" placeholder="Username" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
    <p>Already have an account? <span onclick="toggleForms()">Sign In</span></p>
  </form>
</div>

<div class="form-container" id="signin-form" style="display: none;">
  <h2>Signin</h2>
  <form>
    <input type="text" id="login-username" placeholder="Username or Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit">Sign In</button>
    <p>Don't have an account? <span onclick="toggleForms()">Sign Up</span></p>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
