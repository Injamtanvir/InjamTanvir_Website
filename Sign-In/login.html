<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="boxicons/css/boxicons.min.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>InjamTanvir | Login & Registration</title>
</head>
<body>
    <div class="wrapper">
        <nav class="nav">
            <div class="nav-logo">
                <p>InjamTanvir</p>
            </div>
            <div class="nav-menu" id="navMenu">
                <ul>
                    <li><a href="#" class="link active">Home</a></li>
                </ul>
            </div>
            <div class="nav-button">
                <button class="btn white-btn" id="loginBtn" onclick="showLogin1()">Sign In</button>
                <button class="btn" id="registerBtn" onclick="showRegister1()">Sign Up</button>
            </div>
            <div class="nav-menu-btn">
                <i class="bx bx-menu" onclick="toggleMenu()"></i>
            </div>
        </nav>

        <!-- Form box -->
        <div class="form-box">
            <!-- Login form -->
            <div class="login-container" id="loginContainer">
                <div class="top">
                    <span>Don't have an account? <a href="#" onclick="showRegister1()">Sign Up</a></span>
                    <header>Login</header>
                </div>

                <!-- Form tag -->
                <form id="loginForm" onsubmit="login(); return false;">
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Username or Email" name="username">
                        <i class="bx bx-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" class="input-field" placeholder="Password" name="password">
                        <i class="bx bx-lock-alt"></i>
                    </div>
                    <div class="input-box">
                        <input type="submit" class="submit" value="Sign In" onclick="showLogin()"> </button>
                    </div>
                    <div class="two-col">
                        <div class="one">
                            <input type="checkbox" id="login-check" name="remember_me">
                            <label for="login-check"> Remember Me</label>
                        </div>
                        <div class="two">
                            <label><a href="#">Forgot password?</a></label>
                        </div>
                    </div>
                </form>
                <!-- End of form tag -->
            </div>

            <!-- Registration form -->
            <div class="register-container" id="registerContainer">
                <div class="top">
                    <span>Have an account? <a href="#" onclick="showLogin1()">Login</a></span>
                    <header>Sign Up</header>
                </div>
                <div class="two-forms">
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Firstname">
                        <i class="bx bx-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Lastname">
                        <i class="bx bx-user"></i>
                    </div>
                </div>
                <div class="input-box">
                    <input type="text" class="input-field" placeholder="Email">
                    <i class="bx bx-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Password">
                    <i class="bx bx-lock-alt"></i>
                </div>
                <div class="input-box">
                    <input type="submit" class="submit" value="Register" onclick="showRegister()"> </button>
                </div>
                <div class="two-col">
                    <div class="one">
                        <input type="checkbox" id="register-check">
                        <label for="register-check"> Remember Me</label>
                    </div>
                    <div class="two">
                        <label><a href="#">Terms & conditions</a></label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            var navMenu = document.getElementById("navMenu");
            if (navMenu.className === "nav-menu") {
                navMenu.className += " responsive";
            } else {
                navMenu.className = "nav-menu";
            }
        }

        function showLogin() {
            window.location.href = '#';
        }

        function showRegister() {
            window.location.href = '#';
        }
        function showLogin1() {
        var loginContainer = document.getElementById("loginContainer");
        var registerContainer = document.getElementById("registerContainer");
        var loginBtn = document.getElementById("loginBtn");
        var registerBtn = document.getElementById("registerBtn");
        loginContainer.style.left = "4px";
        registerContainer.style.right = "-520px";
        loginBtn.className = "btn white-btn";
        registerBtn.className = "btn";
        loginContainer.style.opacity = 1;
        registerContainer.style.opacity = 0;
    }

    function showRegister1() {
        var loginContainer = document.getElementById("loginContainer");
        var registerContainer = document.getElementById("registerContainer");
        var loginBtn = document.getElementById("loginBtn");
        var registerBtn = document.getElementById("registerBtn");
        loginContainer.style.left = "-510px";
        registerContainer.style.right = "5px";
        loginBtn.className = "btn";
        registerBtn.className = "btn white-btn";
        loginContainer.style.opacity = 0;
        registerContainer.style.opacity = 1;
    }

        async function login() {
            const email = document.querySelector('#loginForm input[name="username"]').value;
            const password = document.querySelector('#loginForm input[name="password"]').value;

            // Send data to the server for authentication
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username: email, password }),
            });

            if (response.ok) {
                // Redirect to dashboard.html upon successful login
                window.location.href = 'Dashboard/dashboard.html';
            } else {
                alert('Login failed. Please check your credentials.');
            }
        }
    </script>
</body>
<form id="registerForm" action="register.php" method="POST">
    <!-- ... -->
    </form>
    
    <form id="loginForm" action="login.php" method="POST">
    <!-- ... -->
    </form>
    </html>
