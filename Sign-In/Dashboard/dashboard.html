<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #8B0000;
      color: #FFF; /* Ensure text is visible on the dark background */
    } 
    .wrap {
      max-width: 90%; /* Responsive width */
      margin: 0 auto; /* Center the wrap */
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .container {
      height: 50px;
      width: 100%; /* Full width of the wrap */
      perspective: 400px;
      margin-bottom: 50px; /* Space between the cube and the images */
    }
    .cube {
      height: 100%; /* Fill the container height */
      transform-origin: center;
      transform-style: preserve-3d;
      animation: rotate 8s infinite ease-in-out;
    }
    .side {
      position: absolute;
      height: 100%; /* 100% of cube's height */
      width: 100%; /* 100% of cube's width */
      font-size: calc(5vw + 1em); /* Responsive font size */
      font-family: "SF Pro", Helvetica, Arial, sans-serif;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      backface-visibility: hidden;
    }
    .side1 { transform: translateZ(25px); }
    .side3 { transform: rotateX(180deg) translateZ(25px); }
    .side4 { transform: rotateX(90deg) translateZ(25px); }
    .side2 { transform: rotateX(-90deg) translateZ(25px); }
    @keyframes rotate {
      0%, 100% { transform: rotateX(0deg) rotateY(0deg); }
      25% { transform: rotateX(90deg); }
      50% { transform: rotateX(180deg); }
      75% { transform: rotateX(270deg); }
    }
    div.gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); /* Responsive grid */
      gap: 10px;
      width: 100%; /* Full width */
      max-width: 500px; /* Maximum width of gallery */
      margin: 0 auto; /* Center the gallery */
    }
    .image-container {
      position: relative;
      overflow: hidden;
    }
    img {
      width: 100%; /* Responsive width */
      height: auto; /* Maintain aspect ratio */
      object-fit: cover;
      border: 3px solid white; /* Adjust border size */
    }
    .image-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent background */
      color: white;
      padding: 5px;
      text-align: center;
      font-size: 16px;
    }
    @media (max-width: 768px) {
      .side {
        font-size: calc(4vw + 1em); /* Smaller font size for smaller screens */
      }
    }
  </style>
</head>
<body>

  <!-- Rotating cube content -->
  <div class="wrap">
    <div class="container">
      <div class="cube">
        <div class="side side1">BracU</div>
        <div class="side side2">Pre-Advising</div>
        <div class="side side3">Routine</div>
        <div class="side side4">Generator</div>
      </div>
    </div>
  </div>

  <!-- Centered images content -->
  <div class="gallery">
    <div class="image-container">
      <a href="BracU_Course_Pre_Advising.exe">
        <img src="Image/image1.jpg" alt="City">
        <div class="image-name">.exe File for Desktop</div>
      </a>
    </div>
    <div class="image-container">
      <a href="another-page2.html">
        <img src="Image/image2.jpg" alt="Trees">
        <div class="image-name">For Webpage</div>
      </a>
    </div>
  </div>

</body>
</html>
